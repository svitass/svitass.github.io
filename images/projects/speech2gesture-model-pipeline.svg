<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1160" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFA"/>
      <stop offset="1" stop-color="#EEF6F4"/>
    </linearGradient>
    <linearGradient id="fusion" x1="474" y1="224" x2="806" y2="496" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DFF4EF"/>
      <stop offset="1" stop-color="#BFE6DD"/>
    </linearGradient>
    <linearGradient id="decoder" x1="840" y1="220" x2="1110" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6F0FF"/>
      <stop offset="1" stop-color="#D3E2FF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#2B4C4A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#4E7F7A"/>
    </marker>
    <style>
      .title { font: 700 34px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173A37; }
      .subtitle { font: 500 16px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5B7874; }
      .group-title { font: 700 20px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #173A37; }
      .card-title { font: 700 18px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #163633; }
      .card-text { font: 500 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4F6F6A; }
      .pill { font: 700 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2F6A62; }
      .small { font: 600 13px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62807B; }
      .mono { font: 700 14px "Consolas", "SFMono-Regular", monospace; fill: #315C96; }
      .stroke { stroke: #B7D7D1; stroke-width: 2; }
      .arrow { stroke: #4E7F7A; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .dash { stroke: #89AAA5; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 10; }
    </style>
  </defs>

  <rect x="24" y="24" width="1232" height="672" rx="32" fill="url(#bg)" stroke="#D8E9E4" filter="url(#shadow)"/>

  <text x="72" y="98" class="title">Speech2Gesture Model Pipeline</text>
  <text x="72" y="128" class="subtitle">Audio, text, and speaker cues are encoded, fused, decoded into skeletal motion, then stabilized for avatar driving.</text>

  <rect x="72" y="176" width="284" height="340" rx="28" fill="#FFFFFF" stroke="#D7E8E3"/>
  <text x="96" y="216" class="group-title">Inputs</text>

  <rect x="96" y="244" width="236" height="76" rx="20" fill="#FFF3E6" stroke="#F2D8B9"/>
  <text x="120" y="274" class="card-title">Audio Signal</text>
  <text x="120" y="300" class="card-text">Prosody, rhythm, phoneme timing</text>

  <rect x="96" y="340" width="236" height="76" rx="20" fill="#EAF5FF" stroke="#C9DDF2"/>
  <text x="120" y="370" class="card-title">Transcript / Text</text>
  <text x="120" y="396" class="card-text">Lexical semantics, phrase structure</text>

  <rect x="96" y="436" width="236" height="76" rx="20" fill="#EDF7EE" stroke="#CBE0CC"/>
  <text x="120" y="466" class="card-title">Speaker Identity</text>
  <text x="120" y="492" class="card-text">Style prior, gesture tendency</text>

  <rect x="406" y="176" width="390" height="340" rx="28" fill="url(#fusion)" stroke="#B7D7D1"/>
  <text x="434" y="216" class="group-title">Encoding and Fusion</text>

  <rect x="434" y="246" width="150" height="86" rx="20" fill="#FFFFFF" stroke="#B7D7D1"/>
  <text x="459" y="278" class="card-title">Audio Encoder</text>
  <text x="459" y="304" class="card-text">MFCC / prosody</text>

  <rect x="434" y="356" width="150" height="86" rx="20" fill="#FFFFFF" stroke="#B7D7D1"/>
  <text x="468" y="388" class="card-title">Text Encoder</text>
  <text x="454" y="414" class="card-text">Semantic context</text>

  <rect x="612" y="301" width="156" height="86" rx="20" fill="#FFFFFF" stroke="#B7D7D1"/>
  <text x="631" y="333" class="card-title">Speaker Embed</text>
  <text x="640" y="359" class="card-text">Style condition</text>

  <rect x="516" y="454" width="190" height="40" rx="20" fill="#E7F7F3"/>
  <text x="547" y="480" class="pill">Temporal / Feature Fusion</text>

  <line x1="356" y1="282" x2="434" y2="282" class="arrow"/>
  <line x1="356" y1="378" x2="434" y2="398" class="arrow"/>
  <line x1="356" y1="474" x2="434" y2="430" class="arrow"/>
  <line x1="584" y1="289" x2="612" y2="332" class="dash"/>
  <line x1="584" y1="398" x2="612" y2="356" class="dash"/>
  <line x1="509" y1="332" x2="611" y2="454" class="dash"/>
  <line x1="509" y1="442" x2="611" y2="454" class="dash"/>
  <line x1="690" y1="387" x2="611" y2="454" class="dash"/>

  <rect x="840" y="176" width="368" height="340" rx="28" fill="url(#decoder)" stroke="#C4D3F0"/>
  <text x="868" y="216" class="group-title">Motion Decoding</text>

  <rect x="868" y="248" width="312" height="96" rx="24" fill="#FFFFFF" stroke="#C4D3F0"/>
  <text x="892" y="282" class="card-title">Autoregressive Motion Decoder</text>
  <text x="892" y="310" class="card-text">Predicts frame-wise upper-body gesture sequence</text>

  <rect x="868" y="368" width="144" height="110" rx="22" fill="#F6FAFF" stroke="#C4D3F0"/>
  <text x="906" y="402" class="card-title">Output</text>
  <text x="892" y="432" class="mono">6D joint rotation</text>
  <text x="903" y="456" class="small">+ root motion</text>

  <rect x="1036" y="368" width="144" height="110" rx="22" fill="#F6FAFF" stroke="#C4D3F0"/>
  <text x="1061" y="402" class="card-title">Postprocess</text>
  <text x="1074" y="432" class="mono">Slerp</text>
  <text x="1067" y="456" class="small">jitter reduction</text>

  <line x1="796" y1="346" x2="868" y2="296" class="arrow"/>
  <line x1="1024" y1="344" x2="1024" y2="368" class="arrow"/>
  <line x1="1012" y1="423" x2="1036" y2="423" class="arrow"/>

  <rect x="72" y="560" width="1136" height="90" rx="28" fill="#173A37"/>
  <text x="112" y="596" fill="#EFFFFB" class="group-title">Avatar Driving Interface</text>
  <text x="112" y="622" fill="#D4EBE6" class="card-text">Unified skeleton hierarchy, joint names, transform format, and runtime retargeting keep the generated motion reusable inside the digital-human pipeline.</text>
  <path d="M1110 560V516" class="arrow" stroke="#173A37"/>
</svg>
